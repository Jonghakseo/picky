# Warning-first SwiftLint configuration for Picky.
#
# Structural refactors should reduce these warnings over time, but existing large
# facades must not be split just to satisfy a line-count gate. See:
# - docs/refactoring-principles.md
#
# Ratchet policy: `error` thresholds are pinned just above the current worst
# offender so the build stays green while any regression fails immediately.
# When a refactor lands and lowers the worst case, tighten the error value to
# the new worst case + small headroom. Never raise an error threshold without
# an explicit decision recorded in docs/refactoring-principles.md.

included:
  - Picky
  - PickyTests

excluded:
  - build
  - agentd
  - node_modules
  - Picky.xcodeproj

disabled_rules:
  # These legacy style rules currently produce hard errors unrelated to the
  # refactoring safety gates. Keep this config warning-first and introduce
  # narrower ratchets later if these become a priority.
  - identifier_name
  - shorthand_operator

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicit_optional_initialization

line_length:
  warning: 120
  error: 750 # ratchet: current max 721
  ignores_comments: false
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: false

file_length:
  warning: 1500
  error: 3900 # ratchet: current max 3806 (PickySessionViewModelTests)
  ignore_comment_only_lines: true

type_body_length:
  warning: 700
  error: 3400 # ratchet: current max 3308 (PickySessionViewModelTests)

function_body_length:
  warning: 120
  error: 420 # ratchet: current max 397 (PickyInteractionReducer.reduce)

function_parameter_count:
  warning: 5
  error: 16 # ratchet: current max 14 (PickyAgentDaemonLauncher)

large_tuple:
  warning: 2
  error: 5

cyclomatic_complexity:
  warning: 18
  error: 80 # ratchet: current max 77 (PickyInteractionReducer.reduce)

empty_count:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: warning

force_unwrapping:
  severity: warning

custom_rules:
  picky_raw_print:
    name: "Use PickyLog instead of raw print"
    regex: "\\bprint\\s*\\("
    message: "Route production diagnostics through PickyLog/OSLog so diagnostics bundles can collect them."
    severity: warning
    excluded:
      - "Picky/Feedback/PickyLogger.swift"
      - "PickyTests/.*"

  picky_silent_async_action:
    name: "Do not silently drop async user-action failures"
    regex: "(?s)Task(?:\\s*\\([^)]*\\))?\\s*\\{(?:[^{}]|\\{[^{}]*\\})*try\\?\\s*await\\s+(?!Task\\.sleep)"
    message: "Side-effecting async user actions should fail visibly or be logged; avoid Task { try? await ... }."
    severity: warning

  picky_task_detached_escape_hatch:
    name: "Task.detached requires justification"
    regex: "Task\\.detached"
    message: "Task.detached is an escape hatch; justify it per docs/swift-concurrency.md."
    severity: warning

  picky_semaphore_escape_hatch:
    name: "Do not block async flows with semaphores"
    regex: "DispatchSemaphore|\\bsemaphore\\b"
    message: "Avoid semaphores in async/UI code unless explicitly justified."
    severity: warning
